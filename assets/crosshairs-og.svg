    <text x="354" y="523" text-anchor="middle">Theism</text>
    <rect x="446" y="492" width="188" height="46" rx="8" fill="#1f5a3a"/>
    <text x="540" y="523" text-anchor="middle">Resurrection</text>
    <rect x="650" y="492" width="156" height="46" rx="8" fill="#7c2f47"/>
    <text x="728" y="523" text-anchor="middle">Morality</text>
