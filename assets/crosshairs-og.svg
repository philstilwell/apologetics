<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Crosshairs Audit Lab</title>
  <desc id="desc">Belief under inspection: interactive audits for Christian apologetics.</desc>
  <rect width="1200" height="630" fill="#f5f5f2"/>
  <rect x="44" y="44" width="1112" height="542" rx="22" fill="#ffffff" stroke="#111111" stroke-width="4"/>
  <rect x="44" y="44" width="1112" height="18" rx="9" fill="#111111"/>
  <circle cx="160" cy="160" r="62" fill="#111111"/>
  <text x="160" y="184" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="900" fill="#ffffff">X</text>
  <text x="250" y="156" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="900" fill="#111111">Crosshairs Audit Lab</text>
  <text x="250" y="218" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#555555">Belief under inspection</text>
  <line x1="92" y1="296" x2="1108" y2="296" stroke="#d3d3d3" stroke-width="3"/>
  <text x="92" y="368" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900" fill="#111111">Interactive audits for Christian apologetics</text>
  <text x="92" y="426" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#3f3f3f">Evidence, induction, miracles, moral systems, moral particulars, and testable promises.</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="#ffffff">
    <rect x="92" y="492" width="170" height="46" rx="8" fill="#8a5200"/>
